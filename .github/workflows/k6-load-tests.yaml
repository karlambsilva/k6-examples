name: Run Grafana K6 Loading Tests

on:
  push:
    branches:
      - main

jobs:

  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      
      - name: Run k6 tests
        uses: grafana/run-k6-action@v1
        with:
          path: |
            ./tests/*test.js
            ./tests/*script.js
